name: 🔄 Update Repo Stats

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push changes to README

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📊 Fetch repo counts from GitHub API
        id: counts
        run: |
          # Fetch both public + private counts from authenticated /user endpoint
          USER_DATA=$(curl -s "https://api.github.com/user" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json")

          PUBLIC_REPOS=$(echo "$USER_DATA" | jq '.public_repos')
          PRIVATE_REPOS=$(echo "$USER_DATA" | jq '.owned_private_repos')

          # Total = public + owned private (matches GitHub UI repo count)
          TOTAL_REPOS=$(( PUBLIC_REPOS + PRIVATE_REPOS ))

          echo "public_repos=$PUBLIC_REPOS" >> $GITHUB_OUTPUT
          echo "total_repos=$TOTAL_REPOS" >> $GITHUB_OUTPUT
          echo "✅ Public: $PUBLIC_REPOS | Private: $PRIVATE_REPOS | Total: $TOTAL_REPOS"

      - name: ✏️ Update README badges
        run: |
          # Replace the number in Total Repositories badge
          sed -i "s|Total%20Repositories-[0-9]*-|Total%20Repositories-${{ steps.counts.outputs.total_repos }}-|g" README.md

          # Replace the number in Public Repositories badge
          sed -i "s|Public%20Repositories-[0-9]*-|Public%20Repositories-${{ steps.counts.outputs.public_repos }}-|g" README.md

          echo "✅ README updated with: Total=${{ steps.counts.outputs.total_repos }}, Public=${{ steps.counts.outputs.public_repos }}"

      - name: 🚀 Commit and push if changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && echo "No changes to commit" || (
            git add README.md &&
            git commit -m "chore(readme): auto-update repo stats [skip ci]" &&
            git push
          )
